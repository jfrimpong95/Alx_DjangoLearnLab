{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>All Posts</title>
    <link rel="stylesheet" href="{% static 'blog/css/style.css' %}">
</head>
<body>
    <h1>All Blog Posts</h1>
    <a href="{% url 'post-create' %}">Create New Post</a>
    <ul>
    {% for post in posts %}
        <li>
            <a href="{% url 'post-detail' post.pk %}">{{ post.title }}</a>
            by {{ post.author.username }}
        </li>
    {% empty %}
        <li>No posts yet!</li>
    {% endfor %}
    </ul>
</body>
</html>
